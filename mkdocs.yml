# V11 Enterprise Production Authority Edition
# FlaxseedsPro Documentation — Everything exists for the main website

site_name: FlaxseedsPro Documentation
site_description: Technical documentation for premium flaxseed processing — hull, kernel, powder, gum, and oil fractions. HACCP | ISO 22000 | Organic | FSSC 22000.
site_url: https://docs.flaxseedspro.com
site_author: FlaxseedsPro

repo_url: https://github.com/flaxseedspro/docs
repo_name: flaxseedspro/docs

theme:
  name: material
  language: en
  palette:
    primary: indigo
    accent: amber
  font:
    text: Roboto
    code: Fira Code
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tooltips

extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX

extra_css:
  - assets/css/extra.css

plugins:
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.emoji
  - attr_list
  - md_in_html
  - footnotes
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md

  - Products:
      - Overview: products/index.md
      - Flaxseed Hull:
          - Specification: products/flaxseed-hull-spec.md
          - Process & Workflow: products/flaxseed-hull-process.md
      - Flaxseed Kernel:
          - Specification: products/flaxseed-kernel-spec.md
          - Process & Workflow: products/flaxseed-kernel-process.md
      - Flaxseed Powder:
          - Specification: products/flaxseed-powder-spec.md
          - Process & Workflow: products/flaxseed-powder-process.md
      - Flaxseed Gum:
          - Specification: products/flaxseed-gum-spec.md
          - Process & Workflow: products/flaxseed-gum-process.md
      - Flaxseed Oil:
          - Specification: products/flaxseed-oil-spec.md
          - Process & Workflow: products/flaxseed-oil-process.md

  - Production Equipment:
      - Overview: production-equipment/index.md
      - Cleaning & Grading:
          - Technical Spec: production-equipment/cleaning-grading-spec.md
          - SOP: production-equipment/sop-cleaning-grading.md
      - Dehulling & Separation:
          - Technical Spec: production-equipment/dehulling-separation-spec.md
          - SOP: production-equipment/sop-dehulling.md
      - Grinding & Milling:
          - Technical Spec: production-equipment/grinding-milling-spec.md
          - SOP: production-equipment/sop-grinding.md
      - Oil Pressing:
          - Technical Spec: production-equipment/oil-pressing-spec.md
          - SOP: production-equipment/sop-oil-pressing.md
      - Gum Extraction:
          - Technical Spec: production-equipment/gum-extraction-spec.md
          - SOP: production-equipment/sop-gum-extraction.md
      - Drying & Stabilization:
          - Technical Spec: production-equipment/drying-stabilization-spec.md
          - SOP: production-equipment/sop-drying.md
      - Packaging & Storage:
          - Technical Spec: production-equipment/packaging-storage-spec.md
          - SOP: production-equipment/sop-packaging.md

  - Technical Documents:
      - Overview: technical-documents/index.md
      - Processing Technology: technical-documents/processing-technology.md
      - Process Control & Automation: technical-documents/process-control.md
      - Quality Control: technical-documents/quality-control.md
      - Quality Validation: technical-documents/quality-validation.md

  - Food Safety System:
      - Overview: food-safety/index.md
      - HACCP Plan: food-safety/haccp-plan.md
      - Prerequisite Programs: food-safety/prerequisite-programs.md
      - Sanitation SSOP: food-safety/ssop.md
