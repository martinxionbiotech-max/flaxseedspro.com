# V11 Enterprise Production Authority Edition
# FlaxseedsPro Documentation — Everything exists for the main website

site_name: FlaxseedsPro Documentation
site_description: Technical documentation for premium flaxseed processing — hull, kernel, powder, gum, and oil fractions. HACCP | ISO 22000 | Organic.
site_url: https://flaxseedspro.com
site_author: FlaxseedsPro

repo_url: https://github.com/flaxseedspro/docs
repo_name: flaxseedspro/docs

theme:
  name: material
  language: en
  palette:
    primary: indigo
    accent: amber
  font:
    text: Roboto
    code: Fira Code
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips

extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX

extra_css:
  - assets/css/extra.css

plugins:
  - search
  - sitemap
  - redirects
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.emoji
  - attr_list
  - md_in_html
  - footnotes
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Products:
      - products/index.md
      - Flaxseed Hull: products/flaxseed-hull.md
      - Flaxseed Kernel: products/flaxseed-kernel.md
      - Flaxseed Powder: products/flaxseed-powder.md
      - Flaxseed Gum: products/flaxseed-gum.md
      - Flaxseed Oil: products/flaxseed-oil.md
  - Production Equipment:
      - production-equipment/index.md
      - Cleaning & Grading: production-equipment/cleaning-grading.md
      - Dehulling & Separation: production-equipment/dehulling-separation.md
      - Grinding & Milling: production-equipment/grinding-milling.md
      - Oil Pressing: production-equipment/oil-pressing.md
      - Gum Extraction: production-equipment/gum-extraction.md
      - Drying & Stabilization: production-equipment/drying-stabilization.md
      - Packaging & Storage: production-equipment/packaging-storage.md
  - Technical Documents:
      - technical-documents/index.md
      - Processing Technology: technical-documents/processing-technology.md
      - Quality Control: technical-documents/quality-control.md
  - FAQ: faq/index.md
  - Glossary: glossary/index.md
  - Guides: guides/index.md
  - Research: research/index.md
  - White Papers: white-papers/index.md
  - Certificates: certificates/index.md
  - Resources: resources/index.md
  - About: about/index.md

copyright: Copyright &copy; 2026 FlaxseedsPro. All rights reserved.
